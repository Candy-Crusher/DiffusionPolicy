<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RLBench Closed-Loop Comparison Dashboard</title>
  <style>
    :root {
      --ink: #16202b;
      --muted: #607083;
      --line: #d7dee8;
      --paper: #f6f8fb;
      --panel: #fff;
      --accent: #155e75;
      --accent-soft: #e6f4f7;
      --bad: #b42318;
      --warn: #9a5b00;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }
    header { background: var(--panel); border-bottom: 1px solid var(--line); }
    .wrap { width: min(1240px, calc(100% - 32px)); margin: 0 auto; }
    .hero { padding: 28px 0 18px; }
    h1 { margin: 0 0 8px; font-size: clamp(28px, 4vw, 44px); line-height: 1.06; letter-spacing: 0; }
    .subhead { margin: 0; max-width: 900px; color: var(--muted); }
    main { padding: 18px 0 42px; }
    .controls {
      display: grid;
      grid-template-columns: 1fr 220px 180px;
      gap: 12px;
      align-items: end;
      margin-bottom: 16px;
    }
    .model-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
    button, select {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }
    button { padding: 7px 11px; cursor: pointer; }
    button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    label { display: grid; gap: 5px; color: var(--muted); font-size: 13px; font-weight: 650; }
    select { width: 100%; padding: 0 10px; }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 14px; }
    .stat b { display: block; font-size: 28px; line-height: 1.1; }
    .stat span { color: var(--muted); font-size: 13px; }
    .chart-panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 14px; margin-bottom: 16px; }
    .chart-head { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; margin-bottom: 8px; }
    .chart-head h2 { font-size: 18px; }
    .chart-note { color: var(--muted); font-size: 13px; }
    .rate-chart { width: 100%; min-height: 290px; }
    .rate-chart svg { display: block; width: 100%; height: auto; overflow: visible; }
    .axis text { fill: var(--muted); font-size: 11px; }
    .axis line, .axis path, .grid line { stroke: var(--line); }
    .grid text { fill: var(--muted); font-size: 11px; }
    .series-line { fill: none; stroke-width: 2.4; }
    .series-point { stroke: #fff; stroke-width: 1.5; }
    .series-point.current { stroke: var(--ink); stroke-width: 2.5; }
    .chart-legend { display: flex; flex-wrap: wrap; gap: 8px 14px; margin-top: 8px; color: var(--muted); font-size: 12px; }
    .legend-item { display: inline-flex; align-items: center; gap: 6px; }
    .legend-swatch { width: 12px; height: 3px; border-radius: 2px; display: inline-block; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 14px; }
    .run-head { display: flex; justify-content: space-between; gap: 16px; align-items: start; }
    h2 { margin: 0; font-size: 24px; letter-spacing: 0; }
    .meta { color: var(--muted); margin: 4px 0 0; }
    .prompt { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 6px; color: var(--muted); }
    code {
      color: var(--ink);
      background: #eef3f6;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 2px 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 0.92em;
    }
    .score { min-width: 96px; text-align: right; font-size: 30px; font-weight: 760; }
    .score span { display: block; color: var(--muted); font-size: 13px; font-weight: 650; }
    .links { display: flex; flex-wrap: wrap; gap: 12px; margin: 12px 0; font-size: 14px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .episodes { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; }
    .episode { border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: #fff; }
    .episode-meta { display: flex; justify-content: space-between; gap: 10px; padding: 8px 10px; color: var(--muted); font-size: 13px; border-bottom: 1px solid var(--line); }
    .episode-info { padding: 8px 10px; border-bottom: 1px solid var(--line); }
    .episode-prompt { margin: 0; color: var(--ink); font-size: 13px; line-height: 1.35; }
    .episode-submeta { margin: 4px 0 0; color: var(--muted); font-size: 12px; }
    .kind { display: inline-block; margin-right: 6px; color: var(--accent); font-weight: 760; }
    .fail { color: var(--bad); font-weight: 750; }
    .ok { color: #12743b; font-weight: 750; }
    .warn { color: var(--warn); font-weight: 750; }
    video { display: block; width: 100%; aspect-ratio: 2 / 1; background: #111820; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    th, td { padding: 10px 11px; border-bottom: 1px solid var(--line); text-align: left; font-size: 14px; }
    th { color: var(--muted); background: #edf3f5; font-weight: 700; }
    tr:last-child td { border-bottom: 0; }
    .empty { padding: 28px; text-align: center; color: var(--muted); }
    @media (max-width: 860px) {
      .controls { grid-template-columns: 1fr; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .run-head { display: block; }
      .score { text-align: left; margin-top: 10px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap hero">
      <h1>RLBench Closed-Loop Comparison Dashboard</h1>
      <p class="subhead">Select a model, checkpoint step, and RLBench task to inspect success rate, task prompt, summary files, and saved closed-loop rollout videos.</p>
    </div>
  </header>
  <main class="wrap">
    <section class="controls" aria-label="Dashboard controls">

      <label>Task

      </label>
      <label>Checkpoint / Eval Step

      </label>
    </section>
    <section class="summary" id="summary"></section>
    <section class="chart-panel" aria-label="Success rate curve">

        <span class="chart-note" id="chartNote"></span>
      </div>

      <div class="chart-legend" id="chartLegend"></div>

    <section class="panel" id="runPanel"></section>

    </table>
  </main>

  <script>
    const data = JSON.parse(document.getElementById('reportData').textContent);
    const modelButtons = document.getElementById('modelButtons');
    const taskSelect = document.getElementById('taskSelect');
    const stepSelect = document.getElementById('stepSelect');
    const summary = document.getElementById('summary');
    const runPanel = document.getElementById('runPanel');
    const runRows = document.getElementById('runRows');
    const rateChart = document.getElementById('rateChart');
    const chartLegend = document.getElementById('chartLegend');
    const chartNote = document.getElementById('chartNote');
    let state = { model: 'dp', task: 'place_cups', runId: '' };
    const chartColors = ['#155e75', '#b42318', '#12743b', '#8a4f00', '#5b4ab8', '#0f766e', '#9f1239', '#4d7c0f', '#6d28d9', '#0369a1'];

    function option(value, label) {
      const element = document.createElement('option');
      element.value = value;
      element.textContent = label;
      return element;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function runsFor(model, task) {
      return data.runs.filter((run) => run.model === model && run.task === task);
    }

    function sortedRuns(runs) {
      return [...runs].sort((a, b) => {
        const na = Number(a.step);
        const nb = Number(b.step);
        if (!Number.isNaN(na) && !Number.isNaN(nb)) return nb - na;
        return String(b.step).localeCompare(String(a.step));
      });
    }

    function sortedRunsAscending(runs) {
      return [...runs].sort((a, b) => {
        const na = Number(a.step);
        const nb = Number(b.step);
        if (!Number.isNaN(na) && !Number.isNaN(nb)) return na - nb;
        return String(a.step).localeCompare(String(b.step));
      });
    }

    function selectedRun() {
      return data.runs.find((run) => run.run_id === state.runId);
    }

    function renderModelButtons() {
      modelButtons.innerHTML = '';
      Object.entries(data.models).forEach(([id, label]) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.textContent = label;
        button.className = id === state.model ? 'active' : '';
        button.addEventListener('click', () => {
          state.model = id;
          const availableTasks = tasksForModel(state.model);
          state.task = availableTasks.includes(state.task) ? state.task : availableTasks[0];
          refreshSteps();
          render();
        });
        modelButtons.appendChild(button);
      });
    }

    function renderTaskSelect() {
      taskSelect.innerHTML = '';
      tasksForModel(state.model).forEach((id) => taskSelect.appendChild(option(id, data.tasks[id].title)));
      taskSelect.value = state.task;
    }

    function tasksForModel(model) {
      const tasks = [...new Set(data.runs.filter((run) => run.model === model).map((run) => run.task))];
      return tasks.length ? tasks : Object.keys(data.tasks);
    }

    function refreshSteps() {
      const runs = sortedRuns(runsFor(state.model, state.task));
      state.runId = runs.some((run) => run.run_id === state.runId) ? state.runId : (runs[0]?.run_id || '');
    }

    function renderStepSelect() {
      stepSelect.innerHTML = '';
      const runs = sortedRuns(runsFor(state.model, state.task));
      if (runs.length === 0) {
        stepSelect.appendChild(option('', 'no runs'));
        stepSelect.disabled = true;
      } else {
        runs.forEach((run) => stepSelect.appendChild(option(run.run_id, formatRunOption(run))));
        stepSelect.disabled = false;
      }
      stepSelect.value = state.runId;
    }

    function formatStep(run) {
      const step = run.step;
      if (run.model === 'dp' || run.model === 'dp3' || run.model === 'dp_light') {
        if (step === 'latest') return 'latest.ckpt (global step not recorded)';
        if (String(step).startsWith('epoch ')) return `ckpt ${step}`;
        if (String(step).startsWith('global ')) return `ckpt ${step}`;
        if (String(step).startsWith('latest ')) return `ckpt ${step}`;
        return `ckpt global step ${step}`;
      }
      return `eval step ${step}`;
    }

    function sourceLabel(run) {
      const id = run.run_id || '';
      if (id.includes('compact_peractfix')) return 'PerACT compact rerender · fixed asset/stat';
      if (id.includes('rerun_h256')) return 'h256 rerun';
      return '';
    }

    function formatRunOption(run) {
      const source = sourceLabel(run);
      return `${formatStep(run)} · ${run.action_mode}${source ? ` · ${source}` : ''}`;
    }

    function rateText(run) {
      if (!run || run.rate === null || run.rate === undefined) return 'running';
      return `${(run.rate * 100).toFixed(1)}%`;
    }

    function successText(run) {
      if (!run || run.success === null || run.total === null) return 'running';
      return `${run.success}/${run.total}`;
    }

    function renderSummary(run) {
      summary.innerHTML = '';
      const task = data.tasks[state.task];
      const cards = [
        ['Model', data.models[state.model]],
        ['Task', task.title],
        ['Prompt', task.prompt],
        ['Source', run ? (sourceLabel(run) || 'closed-loop dashboard') : 'no runs'],
        ['Success', run ? successText(run) : 'no runs'],
      ];
      cards.forEach(([label, value]) => {
        const div = document.createElement('div');
        div.className = 'stat';
        div.innerHTML = `<b>${value}</b><span>${label}</span>`;
        summary.appendChild(div);
      });
    }

    function renderPanel(run) {
      const task = data.tasks[state.task];
      if (!run) {
        runPanel.innerHTML = `<div class="empty">No closed-loop run found for <b>${data.models[state.model]}</b> on <b>${task.title}</b> yet.<br><span>Task prompt: <code>${task.prompt}</code></span></div>`;
        return;
      }
      const statusClass = run.status === 'complete' ? '' : 'warn';
      const links = [
        run.summary_path ? `<a href="${run.summary_path}">summary json</a>` : '',
        run.metrics_path ? `<a href="${run.metrics_path}">metrics json</a>` : '',
      ].filter(Boolean).join('');
      const videos = run.videos.map((video) => {
        const label = video.success === true ? '<span class="ok">success</span>' : video.success === false ? '<span class="fail">failure</span>' : '<span>unknown</span>';
        const title = video.label || `Episode ${String(video.episode).padStart(2, '0')}`;
        const kind = video.kind ? `<span class="kind">${escapeHtml(video.kind)}</span>` : '';
        const prompt = video.prompt || task.prompt;
        const meta = [
          video.variation === null || video.variation === undefined ? '' : `variation ${video.variation}`,
          video.seed === null || video.seed === undefined ? '' : `seed ${video.seed}`,
        ].filter(Boolean).join(' · ');
        return `<article class="episode">
          <div class="episode-meta"><span>${kind}${escapeHtml(title)} · ep ${String(video.episode).padStart(2, '0')}</span>${label}</div>
          <div class="episode-info">
            <p class="episode-prompt">${escapeHtml(prompt)}</p>
            ${meta ? `<p class="episode-submeta">${escapeHtml(meta)}</p>` : ''}
          </div>
          <video src="${video.path}" controls preload="metadata"></video>
        </article>`;
      }).join('');
      runPanel.innerHTML = `
        <div class="run-head">
          <div>
            <h2>${data.models[run.model]} · ${task.title}</h2>
            <p class="meta">${run.status} · ${formatStep(run)} · ${run.action_mode} action · seed base ${run.seed_base ?? 'n/a'}</p>
            <p class="prompt"><b>Task prompt</b><code>${task.prompt}</code></p>
          </div>
          <div class="score ${statusClass}">${successText(run)}<span>${rateText(run)}</span></div>
        </div>
        <div class="links">${links}</div>
        <div class="episodes">${videos || '<div class="empty">No videos saved for this run yet.</div>'}</div>`;
    }

    function seriesKey(run) {
      return `${run.model}:${run.action_mode}`;
    }

    function seriesLabel(run) {
      const action = run.action_mode ? ` · ${run.action_mode}` : '';
      return `${data.models[run.model]}${action}`;
    }

    function renderRateChart() {
      const runs = sortedRunsAscending(data.runs.filter((run) =>
        run.task === state.task && run.rate !== null && run.rate !== undefined
      ));
      const task = data.tasks[state.task];
      if (!runs.length) {
        rateChart.innerHTML = '<div class="empty">No completed success-rate points for this task yet.</div>';
        chartLegend.innerHTML = '';
        chartNote.textContent = task.title;
        return;
      }
      const groups = new Map();
      runs.forEach((run) => {
        const key = seriesKey(run);
        if (!groups.has(key)) groups.set(key, { label: seriesLabel(run), runs: [] });
        groups.get(key).runs.push(run);
      });
      const labels = [...new Set(runs.map((run) => formatStep(run)))];
      const xIndex = new Map(labels.map((label, index) => [label, index]));
      const width = 960;
      const height = 300;
      const margin = { top: 16, right: 24, bottom: 74, left: 46 };
      const plotW = width - margin.left - margin.right;
      const plotH = height - margin.top - margin.bottom;
      const x = (label) => margin.left + (labels.length <= 1 ? plotW / 2 : xIndex.get(label) * plotW / (labels.length - 1));
      const y = (rate) => margin.top + (1 - Math.max(0, Math.min(1, Number(rate)))) * plotH;
      const yTicks = [0, 0.25, 0.5, 0.75, 1.0];
      let svg = `<svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Success-rate curve for ${escapeHtml(task.title)}">`;
      svg += '<g class="grid">';
      yTicks.forEach((tick) => {
        const yy = y(tick);
        svg += `<line x1="${margin.left}" y1="${yy}" x2="${width - margin.right}" y2="${yy}"></line>`;
        svg += `<text x="${margin.left - 10}" y="${yy + 4}" text-anchor="end">${Math.round(tick * 100)}%</text>`;
      });
      svg += '</g>';
      svg += `<g class="axis"><line x1="${margin.left}" y1="${height - margin.bottom}" x2="${width - margin.right}" y2="${height - margin.bottom}"></line></g>`;
      labels.forEach((label, index) => {
        const xx = x(label);
        const show = labels.length <= 8 || index % Math.ceil(labels.length / 8) === 0 || index === labels.length - 1;
        svg += `<g class="axis"><line x1="${xx}" y1="${height - margin.bottom}" x2="${xx}" y2="${height - margin.bottom + 5}"></line>`;
        if (show) svg += `<text x="${xx}" y="${height - margin.bottom + 18}" text-anchor="end" transform="rotate(-28 ${xx} ${height - margin.bottom + 18})">${escapeHtml(shortStepLabel(label))}</text>`;
        svg += '</g>';
      });
      [...groups.values()].forEach((group, groupIndex) => {
        const color = chartColors[groupIndex % chartColors.length];
        const points = group.runs.map((run) => [x(formatStep(run)), y(run.rate), run]);
        if (points.length > 1) {
          const d = points.map((point, index) => `${index === 0 ? 'M' : 'L'}${point[0].toFixed(1)},${point[1].toFixed(1)}`).join(' ');
          svg += `<path class="series-line" d="${d}" stroke="${color}"></path>`;
        }
        points.forEach(([xx, yy, run]) => {
          const current = run.run_id === state.runId ? ' current' : '';
          svg += `<circle class="series-point${current}" cx="${xx}" cy="${yy}" r="5" fill="${color}"><title>${escapeHtml(seriesLabel(run))}\n${escapeHtml(formatStep(run))}\n${successText(run)} (${rateText(run)})</title></circle>`;
        });
      });
      svg += '</svg>';
      rateChart.innerHTML = svg;
      chartLegend.innerHTML = [...groups.values()].map((group, index) => {
        const color = chartColors[index % chartColors.length];
        return `<span class="legend-item"><span class="legend-swatch" style="background:${color}"></span>${escapeHtml(group.label)}</span>`;
      }).join('');
      chartNote.textContent = `${task.title} · ${runs.length} evaluated checkpoints`;
    }

    function shortStepLabel(label) {
      return String(label)
        .replace('ckpt global step ', 'g ')
        .replace('ckpt global ', 'g ')
        .replace('eval step ', 's ');
    }

    function renderRows() {
      runRows.innerHTML = data.runs.map((run) => {
        const task = data.tasks[run.task];
        return `<tr><td>${data.models[run.model]}</td><td>${task.title}</td><td><code>${task.prompt}</code></td><td>${formatStep(run)} · ${run.action_mode}</td><td>${run.status}</td><td>${successText(run)}</td><td>${rateText(run)}</td></tr>`;
      }).join('');
    }

    function render() {
      renderModelButtons();
      renderTaskSelect();
      renderStepSelect();
      const run = selectedRun();
      renderSummary(run);
      renderRateChart();
      renderPanel(run);
      renderRows();
    }

    taskSelect.addEventListener('change', () => {
      state.task = taskSelect.value;
      refreshSteps();
      render();
    });
    stepSelect.addEventListener('change', () => {
      state.runId = stepSelect.value;
      render();
    });

    refreshSteps();
    render();
  </script>
</body>
</html>
